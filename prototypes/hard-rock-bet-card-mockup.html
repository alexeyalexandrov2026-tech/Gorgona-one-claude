<head>
<meta charset="utf-8" />
<title>Hard Rock Bet Card Prototype (NOT LIVE - for review only)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 60px 20px;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .label {
    color: #d4af37;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
  }
  .card {
    position: relative;
    width: 360px;
    max-width: 90vw;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 25px 70px rgba(0,0,0,0.6);
    background: #0a0a0a;
  }
  .banner {
    position: relative;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(85% 65% at 30% 22%, #b98bff 0%, #8b52ee 20%, #5c28b8 40%, #24103f 66%, #050208 100%);
    overflow: hidden;
  }
  /* Diagonal light-streak texture, integrated into the same background
     layer (not a separate pasted asset) so the surface reads as one
     continuous material behind the logo mark. */
  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(115deg, rgba(255,255,255,0.07) 0px, rgba(255,255,255,0.07) 3px, transparent 3px, transparent 22px),
      repeating-linear-gradient(65deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 2px, transparent 2px, transparent 34px);
    mix-blend-mode: overlay;
    opacity: 0.55;
  }
  .banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(55% 50% at 42% 38%, rgba(210,175,255,0.4) 0%, rgba(210,175,255,0) 62%),
      radial-gradient(130% 110% at 50% 108%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.78) 100%);
  }
  .logo-mark {
    position: relative;
    z-index: 2;
    height: 58%;
    width: auto;
    filter: drop-shadow(0 10px 26px rgba(0,0,0,0.55)) drop-shadow(0 0 46px rgba(190,145,255,0.55));
  }
  .pill {
    position: absolute;
    z-index: 3;
    right: 18px;
    top: 18px;
    padding: 6px 14px;
    border-radius: 9999px;
    border: 1px solid rgba(212,175,55,0.65);
    background: rgba(10,6,18,0.55);
    backdrop-filter: blur(6px);
    color: #e8c766;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .body {
    padding: 24px 26px 28px;
    background: linear-gradient(180deg, #0d0d0d 0%, #070707 100%);
  }
  .title {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 10px;
  }
  .desc {
    color: #b7b7bd;
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 20px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 9999px;
    border: 1px solid rgba(212,175,55,0.5);
    color: #d4af37;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
  }
</style>
</head>
